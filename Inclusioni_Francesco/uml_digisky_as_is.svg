<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#222" />
    </marker>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 34px; font-weight: bold; fill:#111; }
      .pkg { fill:#f7f9fc; stroke:#555; stroke-width:2; }
      .cls { fill:#ffffff; stroke:#1f4e79; stroke-width:2.5; }
      .hdr { fill:#eaf3ff; stroke:#1f4e79; stroke-width:2.5; }
      .st { font-family: Arial, sans-serif; font-size:18px; fill:#555; font-style:italic; }
      .name { font-family: Arial, sans-serif; font-size:22px; font-weight:bold; fill:#111; }
      .attr { font-family: Arial, sans-serif; font-size:18px; fill:#111; }
      .rel { stroke:#222; stroke-width:2.3; fill:none; marker-end:url(#arrow); }
      .assoc { stroke:#222; stroke-width:2.3; fill:none; }
      .label { font-family: Arial, sans-serif; font-size:18px; fill:#111; }
      .mult { font-family: Arial, sans-serif; font-size:18px; font-weight:bold; fill:#111; }
      .note { fill:#fff7d6; stroke:#b7950b; stroke-width:2; }
      .notetxt { font-family: Arial, sans-serif; font-size:18px; fill:#111; }
    </style>
  </defs>

  <text x="50" y="55" class="title">UML Class Diagram AS IS – Digisky Data Acquisition and Processing</text>

  <rect x="40" y="85" width="1520" height="950" rx="10" class="pkg"/>
  <text x="65" y="120" class="label">Package: AS IS Information System</text>

  <!-- Classes -->
  <g transform="translate(110,170)">
    <rect width="260" height="170" class="cls"/>
    <rect width="260" height="58" class="hdr"/>
    <text x="130" y="23" text-anchor="middle" class="st">&lt;&lt;Entity&gt;&gt;</text>
    <text x="130" y="48" text-anchor="middle" class="name">Client</text>
    <line x1="0" y1="58" x2="260" y2="58" stroke="#1f4e79" stroke-width="2"/>
    <text x="18" y="88" class="attr">idClient: String</text>
    <text x="18" y="116" class="attr">name: String</text>
    <text x="18" y="144" class="attr">email: String</text>
  </g>

  <g transform="translate(500,170)">
    <rect width="280" height="198" class="cls"/>
    <rect width="280" height="58" class="hdr"/>
    <text x="140" y="23" text-anchor="middle" class="st">&lt;&lt;Entity&gt;&gt;</text>
    <text x="140" y="48" text-anchor="middle" class="name">ServiceRequest</text>
    <line x1="0" y1="58" x2="280" y2="58" stroke="#1f4e79" stroke-width="2"/>
    <text x="18" y="88" class="attr">idRequest: String</text>
    <text x="18" y="116" class="attr">requestDate: Date</text>
    <text x="18" y="144" class="attr">serviceType: String</text>
    <text x="18" y="172" class="attr">status: String</text>
  </g>

  <g transform="translate(920,170)">
    <rect width="300" height="198" class="cls"/>
    <rect width="300" height="58" class="hdr"/>
    <text x="150" y="23" text-anchor="middle" class="st">&lt;&lt;Entity&gt;&gt;</text>
    <text x="150" y="48" text-anchor="middle" class="name">DroneMission</text>
    <line x1="0" y1="58" x2="300" y2="58" stroke="#1f4e79" stroke-width="2"/>
    <text x="18" y="88" class="attr">idMission: String</text>
    <text x="18" y="116" class="attr">missionDate: Date</text>
    <text x="18" y="144" class="attr">area: String</text>
    <text x="18" y="172" class="attr">operator: String</text>
  </g>

  <g transform="translate(920,490)">
    <rect width="300" height="198" class="cls"/>
    <rect width="300" height="58" class="hdr"/>
    <text x="150" y="23" text-anchor="middle" class="st">&lt;&lt;Entity&gt;&gt;</text>
    <text x="150" y="48" text-anchor="middle" class="name">SurveyData</text>
    <line x1="0" y1="58" x2="300" y2="58" stroke="#1f4e79" stroke-width="2"/>
    <text x="18" y="88" class="attr">idData: String</text>
    <text x="18" y="116" class="attr">filePath: String</text>
    <text x="18" y="144" class="attr">dataType: String</text>
    <text x="18" y="172" class="attr">acquisitionDate: Date</text>
  </g>

  <g transform="translate(500,490)">
    <rect width="280" height="198" class="cls"/>
    <rect width="280" height="58" class="hdr"/>
    <text x="140" y="23" text-anchor="middle" class="st">&lt;&lt;Entity&gt;&gt;</text>
    <text x="140" y="48" text-anchor="middle" class="name">Report</text>
    <line x1="0" y1="58" x2="280" y2="58" stroke="#1f4e79" stroke-width="2"/>
    <text x="18" y="88" class="attr">idReport: String</text>
    <text x="18" y="116" class="attr">creationDate: Date</text>
    <text x="18" y="144" class="attr">format: String</text>
    <text x="18" y="172" class="attr">version: String</text>
  </g>

  <g transform="translate(110,490)">
    <rect width="260" height="198" class="cls"/>
    <rect width="260" height="58" class="hdr"/>
    <text x="130" y="23" text-anchor="middle" class="st">&lt;&lt;OrganizationalUnit&gt;&gt;</text>
    <text x="130" y="48" text-anchor="middle" class="name">Department</text>
    <line x1="0" y1="58" x2="260" y2="58" stroke="#1f4e79" stroke-width="2"/>
    <text x="18" y="88" class="attr">idDepartment: String</text>
    <text x="18" y="116" class="attr">name: String</text>
    <text x="18" y="144" class="attr">role: String</text>
    <text x="18" y="172" class="attr">manager: String</text>
  </g>

  <g transform="translate(500,800)">
    <rect width="320" height="170" class="cls"/>
    <rect width="320" height="58" class="hdr"/>
    <text x="160" y="23" text-anchor="middle" class="st">&lt;&lt;DataStore&gt;&gt;</text>
    <text x="160" y="48" text-anchor="middle" class="name">GoogleDriveArchive</text>
    <line x1="0" y1="58" x2="320" y2="58" stroke="#1f4e79" stroke-width="2"/>
    <text x="18" y="88" class="attr">idArchive: String</text>
    <text x="18" y="116" class="attr">folderName: String</text>
    <text x="18" y="144" class="attr">storageType: String</text>
  </g>

  <!-- Relations -->
  <line x1="370" y1="255" x2="500" y2="255" class="assoc"/>
  <text x="410" y="236" class="label">submits</text>
  <text x="380" y="278" class="mult">1</text><text x="475" y="278" class="mult">0..*</text>

  <line x1="780" y1="255" x2="920" y2="255" class="assoc"/>
  <text x="820" y="236" class="label">generates</text>
  <text x="790" y="278" class="mult">1</text><text x="885" y="278" class="mult">0..1</text>

  <line x1="1070" y1="368" x2="1070" y2="490" class="assoc"/>
  <text x="1090" y="430" class="label">produces</text>
  <text x="1085" y="390" class="mult">1</text><text x="1085" y="480" class="mult">1..*</text>

  <line x1="920" y1="590" x2="780" y2="590" class="assoc"/>
  <text x="812" y="570" class="label">is processed into</text>
  <text x="890" y="613" class="mult">1..*</text><text x="790" y="613" class="mult">1</text>

  <line x1="640" y1="688" x2="640" y2="800" class="assoc"/>
  <text x="660" y="752" class="label">is stored in</text>
  <text x="656" y="710" class="mult">0..*</text><text x="656" y="790" class="mult">1</text>

  <path d="M370,590 C430,590 440,860 500,860" class="assoc"/>
  <text x="250" y="760" class="label">uses / accesses</text>
  <text x="382" y="612" class="mult">1..*</text><text x="472" y="852" class="mult">1</text>

  <path d="M370,520 C470,420 820,415 920,520" class="assoc"/>
  <text x="540" y="422" class="label">processes data</text>
  <text x="382" y="515" class="mult">1..*</text><text x="890" y="515" class="mult">0..*</text>

  <!-- Notes -->
  <rect x="1010" y="810" width="430" height="135" rx="8" class="note"/>
  <text x="1030" y="845" class="notetxt">AS IS critical point:</text>
  <text x="1030" y="875" class="notetxt">data are stored in an unstructured archive,</text>
  <text x="1030" y="905" class="notetxt">without a centralized database and with</text>
  <text x="1030" y="935" class="notetxt">manual sharing between departments.</text>
</svg>
